<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz IA ∞</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@400;600;700&display=swap');

  :root {
    --bg: #08080f;
    --card: #0f0f1c;
    --border: #1c1c2e;
    --accent: #7b6fff;
    --green: #00e5b0;
    --red: #ff4466;
    --text: #eaeaf5;
    --muted: #888;
    --subtle: #444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Sora', sans-serif;
    padding: 16px;
  }

  #app { width: 100%; max-width: 520px; }

  /* ── SETUP ── */
  .setup-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 32px 24px;
    box-shadow: 0 0 60px rgba(100,80,255,0.09);
  }

  .setup-header { text-align: center; margin-bottom: 28px; }
  .setup-icon { font-size: 46px; margin-bottom: 12px; }
  .setup-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .setup-sub { font-size: 13px; color: var(--muted); line-height: 1.6; }

  .setup-label {
    display: block;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    margin-bottom: 8px;
  }

  .setup-input {
    width: 100%;
    background: #0a0a16;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    margin-bottom: 20px;
    outline: none;
    transition: border-color 0.2s;
  }
  .setup-input:focus { border-color: var(--accent); }
  .setup-input.error { border-color: var(--red); animation: shake 0.3s; }

  .content-area {
    width: 100%;
    background: #0a0a16;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 14px;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    margin-bottom: 8px;
    outline: none;
    transition: border-color 0.2s;
    resize: vertical;
    min-height: 140px;
    line-height: 1.6;
  }
  .content-area:focus { border-color: var(--accent); }
  .content-area.error { border-color: var(--red); animation: shake 0.3s; }
  .content-area::placeholder { color: #333; line-height: 1.7; }

  .char-count {
    font-size: 10px;
    color: var(--subtle);
    font-family: 'Space Mono', monospace;
    text-align: right;
    margin-bottom: 20px;
  }
  .char-count.ok  { color: var(--green); }
  .char-count.warn { color: #ffcc00; }

  .diff-row { display: flex; gap: 8px; margin-bottom: 22px; }

  .diff-btn {
    flex: 1;
    padding: 10px 6px;
    border-radius: 9px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Sora', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .diff-btn.active {
    border-color: var(--accent);
    background: #7b6fff18;
    color: var(--accent);
    font-weight: 700;
  }

  .setup-hint {
    font-size: 11px;
    color: #444;
    margin-bottom: 22px;
    line-height: 1.6;
  }
  .setup-hint a { color: var(--accent); text-decoration: none; }

  .btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--accent), var(--green));
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Sora', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.88; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* topic preview pills */
  .preview-wrap {
    margin-bottom: 20px;
    min-height: 0;
  }

  .preview-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    margin-bottom: 8px;
  }

  .preview-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .pill {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--green);
    border: 1px solid #00e5b025;
    background: #00e5b00d;
    border-radius: 20px;
    padding: 4px 10px;
    animation: fadeIn 0.3s ease;
  }

  /* ── QUIZ CARD ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 26px 22px;
    box-shadow: 0 0 60px rgba(100,80,255,0.07);
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 200px;
  }

  .score-badge {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--green);
    background: #00e5b010;
    border: 1px solid #00e5b025;
    border-radius: 20px;
    padding: 4px 12px;
    transition: transform 0.15s;
    flex-shrink: 0;
  }
  .score-badge.bump { transform: scale(1.3); }

  .progress-wrap {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .streak-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 18px;
  }

  .streak-label {
    font-size: 10px;
    color: var(--subtle);
    font-family: 'Space Mono', monospace;
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  .streak-dots { display: flex; gap: 5px; }

  .dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s, transform 0.2s;
  }
  .dot.hit { background: var(--green); transform: scale(1.2); }
  .dot.miss { background: var(--red); }

  .diff-badge {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 10px;
    margin-left: auto;
  }
  .diff-badge.facil   { color: var(--green); background: #00e5b015; border: 1px solid #00e5b030; }
  .diff-badge.medio   { color: #ffcc00; background: #ffcc0015; border: 1px solid #ffcc0030; }
  .diff-badge.dificil { color: var(--red); background: #ff446615; border: 1px solid #ff446630; }

  .question {
    font-size: 15.5px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 20px;
    min-height: 52px;
  }

  .options { display: flex; flex-direction: column; gap: 9px; margin-bottom: 14px; }

  .option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 15px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: #bbb;
    font-family: 'Sora', sans-serif;
    font-size: 13.5px;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.2s, background 0.2s, color 0.2s;
    width: 100%;
  }
  .option:hover:not(:disabled) { border-color: #7b6fff55; background: #1a1a2e; color: #ddd; }
  .option:disabled { cursor: default; }
  .option.correct { background: #002e1f; border-color: var(--green); color: var(--green); }
  .option.wrong   { background: #2e0010; border-color: var(--red);   color: var(--red);   }

  .opt-letter {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: #1c1c2e;
    color: var(--accent);
    font-size: 10px;
    font-weight: 700;
    font-family: 'Space Mono', monospace;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .explain {
    font-size: 12.5px;
    color: #aaa;
    background: #0a0a16;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 15px;
    margin-bottom: 14px;
    line-height: 1.6;
    animation: fadeIn 0.3s ease;
  }

  .correct-label { color: var(--green); font-weight: 700; }
  .wrong-label   { color: var(--red);   font-weight: 700; }

  .footer-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .q-counter { font-size: 10px; color: var(--subtle); font-family: 'Space Mono', monospace; }
  .stats-mini { font-size: 10px; color: var(--subtle); font-family: 'Space Mono', monospace; }

  .reset-btn {
    font-size: 10px;
    color: #333;
    font-family: 'Space Mono', monospace;
    background: none;
    border: none;
    cursor: pointer;
    letter-spacing: 1px;
    transition: color 0.2s;
  }
  .reset-btn:hover { color: var(--red); }

  /* skeleton */
  .skeleton {
    background: linear-gradient(90deg, #1c1c2e 25%, #252538 50%, #1c1c2e 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 8px;
    height: 18px;
    margin-bottom: 10px;
  }
  .skeleton.wide  { width: 100%; }
  .skeleton.mid   { width: 68%; }
  .skeleton.opt   { width: 100%; height: 48px; margin-bottom: 9px; border-radius: 10px; }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }

  .hidden { display: none !important; }

  .fly {
    position: fixed;
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--green);
    pointer-events: none;
    animation: flyUp 1s ease forwards;
    z-index: 999;
  }
  .fly.neg { color: var(--red); }

  @keyframes flyUp {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-70px) scale(1.4); }
  }

  /* change content btn */
  .change-btn {
    font-size: 10px;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    background: none;
    border: 1px solid #7b6fff33;
    border-radius: 8px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .change-btn:hover { background: #7b6fff15; }
</style>
</head>
<body>
<div id="app">

  <!-- SETUP -->
  <div class="setup-card" id="setup-screen">
    <div class="setup-header">
      <div class="setup-icon">🧠</div>
      <div class="setup-title">Quiz IA ∞</div>
      <p class="setup-sub">Cole qualquer conteúdo — resumo, PDF copiado, anotação de aula — e a IA gera perguntas infinitas sobre ele.</p>
    </div>

    <label class="setup-label">Seu conteúdo de estudo</label>
    <textarea
      class="content-area"
      id="content-input"
      placeholder="Cole aqui o conteúdo que você quer estudar...

Exemplos:
• Resumo de uma aula
• Texto copiado de um PDF
• Suas anotações
• Qualquer tema: história, direito, biologia, programação..."
      oninput="onContentChange()"
    ></textarea>
    <div class="char-count" id="char-count">0 caracteres</div>

    <div class="preview-wrap hidden" id="preview-wrap">
      <div class="preview-label">Tópicos detectados</div>
      <div class="preview-pills" id="preview-pills"></div>
    </div>

    <label class="setup-label">Nível de dificuldade</label>
    <div class="diff-row">
      <button class="diff-btn active" id="diff-facil"   onclick="setDiff('facil')">😌 Fácil</button>
      <button class="diff-btn"        id="diff-medio"   onclick="setDiff('medio')">🧠 Médio</button>
      <button class="diff-btn"        id="diff-dificil" onclick="setDiff('dificil')">🔥 Difícil</button>
    </div>

    <label class="setup-label">Groq API Key</label>
    <input class="setup-input" type="password" id="api-key-input" placeholder="gsk_...">
    <p class="setup-hint">
      Chave gratuita em <a href="https://console.groq.com/keys" target="_blank">console.groq.com/keys</a>.<br>
      Fica só no seu navegador, nunca enviada a terceiros.
    </p>

    <button class="btn" onclick="startQuiz()">Gerar Quiz →</button>
  </div>

  <!-- QUIZ -->
  <div class="card hidden" id="quiz-screen">
    <div class="top-bar">
      <span class="label" id="quiz-title">QUIZ ∞</span>
      <span class="score-badge" id="score-badge">⭐ 0 pts</span>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div class="streak-bar">
      <span class="streak-label">STREAK</span>
      <div class="streak-dots" id="streak-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div>
      </div>
      <span class="diff-badge facil" id="diff-show">FÁCIL</span>
    </div>

    <div id="question-area"></div>

    <div class="footer-bar">
      <span class="q-counter" id="q-counter">Pergunta #1</span>
      <span class="stats-mini" id="stats-mini">0/0 ✓</span>
      <button class="change-btn" onclick="goBack()">✎ trocar conteúdo</button>
    </div>
  </div>

</div>
<script>
let apiKey = '';
let difficulty = 'facil';
let userContent = '';
let contentTitle = '';
let score = 0;
let qCount = 0;
let streak = 0;
let totalRight = 0;
let answered = false;
let usedQuestions = [];
let streakHistory = [];
let previewTimer = null;

// ── SETUP ──────────────────────────────────────────────

function setDiff(d) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('diff-' + d).classList.add('active');
}

function onContentChange() {
  const val = document.getElementById('content-input').value;
  const len = val.length;
  const cc = document.getElementById('char-count');
  cc.textContent = `${len.toLocaleString('pt-BR')} caracteres`;
  cc.className = 'char-count' + (len >= 200 ? ' ok' : len > 50 ? ' warn' : '');

  // debounce preview
  clearTimeout(previewTimer);
  if (len > 80) {
    previewTimer = setTimeout(() => generatePreview(val), 600);
  } else {
    document.getElementById('preview-wrap').classList.add('hidden');
  }
}

function generatePreview(text) {
  // Simple keyword extraction: pick nouns/terms from first 500 chars
  const sample = text.slice(0, 500);
  const words = sample.match(/[A-ZÁÉÍÓÚÂÊÎÔÛÃÕÇ][a-záéíóúâêîôûãõç]{3,}/g) || [];
  const unique = [...new Set(words)].slice(0, 8);

  if (unique.length < 2) {
    document.getElementById('preview-wrap').classList.add('hidden');
    return;
  }

  const pills = unique.map(w => `<span class="pill">${escHtml(w)}</span>`).join('');
  document.getElementById('preview-pills').innerHTML = pills;
  document.getElementById('preview-wrap').classList.remove('hidden');
}

function startQuiz() {
  const content = document.getElementById('content-input').value.trim();
  const key = document.getElementById('api-key-input').value.trim();

  let ok = true;

  if (content.length < 100) {
    document.getElementById('content-input').classList.add('error');
    setTimeout(() => document.getElementById('content-input').classList.remove('error'), 800);
    ok = false;
  }

  if (!key || !key.startsWith('gsk_')) {
    document.getElementById('api-key-input').classList.add('error');
    setTimeout(() => document.getElementById('api-key-input').classList.remove('error'), 800);
    ok = false;
  }

  if (!ok) return;

  apiKey = key;
  userContent = content;

  // generate a short title from first line or first 40 chars
  const firstLine = content.split('\n')[0].trim();
  contentTitle = firstLine.slice(0, 38) + (firstLine.length > 38 ? '…' : '');

  // update quiz header
  document.getElementById('quiz-title').textContent = contentTitle || 'QUIZ ∞';

  // update diff badge
  const badge = document.getElementById('diff-show');
  badge.className = 'diff-badge ' + difficulty;
  badge.textContent = { facil: 'FÁCIL', medio: 'MÉDIO', dificil: 'DIFÍCIL' }[difficulty];

  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');

  resetState();
  loadQuestion();
}

function goBack() {
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('setup-screen').classList.remove('hidden');
}

function resetState() {
  score = 0; qCount = 0; streak = 0;
  totalRight = 0; usedQuestions = []; streakHistory = [];
  updateScore(); updateStreak(); updateStats();
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('q-counter').textContent = 'Pergunta #1';
}

// ── QUESTION LOADING ──────────────────────────────────

async function loadQuestion() {
  answered = false;
  qCount++;
  document.getElementById('q-counter').textContent = `Pergunta #${qCount}`;

  const area = document.getElementById('question-area');
  area.innerHTML = `
    <div class="skeleton wide" style="margin-bottom:8px"></div>
    <div class="skeleton mid" style="margin-bottom:20px"></div>
    <div class="skeleton opt"></div>
    <div class="skeleton opt"></div>
    <div class="skeleton opt"></div>
    <div class="skeleton opt"></div>
  `;

  try {
    const data = await fetchQuestion();
    renderQuestion(data);
  } catch(e) {
    area.innerHTML = `
      <p style="color:#ff4466;font-size:13px;line-height:1.6;margin-bottom:16px">
        ⚠️ ${escHtml(e.message)}
      </p>
      <button class="btn" onclick="loadQuestion()">Tentar novamente</button>
    `;
  }
}

async function fetchQuestion() {
  const avoid = usedQuestions.slice(-12).join(' | ');

  // Truncate content to avoid token overflow (~3000 chars max)
  const contentSnippet = userContent.length > 3000
    ? userContent.slice(0, 3000) + '\n[...conteúdo truncado]'
    : userContent;

  const diffInstructions = {
    facil:   'Perguntas simples e diretas sobre definições, conceitos básicos e identificação de termos presentes no conteúdo.',
    medio:   'Perguntas intermediárias sobre funcionamento, comparações, exemplos de uso e relações entre os conceitos do conteúdo.',
    dificil: 'Perguntas avançadas e técnicas: aplicações práticas, exceções, detalhes específicos, análise crítica e situações-problema baseadas no conteúdo.'
  };

  const prompt = `Você é um gerador especializado de perguntas de quiz para estudantes.

O estudante forneceu o seguinte conteúdo de estudo:
---
${contentSnippet}
---

NÍVEL DE DIFICULDADE: ${difficulty.toUpperCase()}
INSTRUÇÃO: ${diffInstructions[difficulty]}

REGRAS OBRIGATÓRIAS:
- Gere UMA pergunta de múltipla escolha com exatamente 4 alternativas.
- A pergunta DEVE ser baseada exclusivamente no conteúdo fornecido acima.
- Apenas UMA alternativa deve estar correta.
- As alternativas incorretas devem ser plausíveis, não óbvias.
- A explicação deve referenciar o conteúdo e ser didática.
- Escreva tudo em português brasileiro.
- NÃO repita estas perguntas já usadas: [${avoid || 'nenhuma ainda'}]

Responda SOMENTE com JSON válido, sem markdown, sem texto extra:
{
  "question": "texto da pergunta",
  "options": ["opção A", "opção B", "opção C", "opção D"],
  "answer": 0,
  "explanation": "explicação curta, didática e baseada no conteúdo"
}

O campo "answer" é o índice 0-3 da opção correta.`;

  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      temperature: 0.85,
      max_tokens: 500,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `Erro HTTP ${res.status}. Verifique sua chave API.`);
  }

  const json = await res.json();
  const raw = json.choices?.[0]?.message?.content?.trim() || '';
  const clean = raw.replace(/```json|```/g, '').trim();

  let data;
  try { data = JSON.parse(clean); }
  catch { throw new Error('A IA retornou formato inválido. Tentando novamente...'); }

  if (!data.question || !Array.isArray(data.options) || data.options.length !== 4 || data.answer == null) {
    throw new Error('Dados incompletos da IA. Tente novamente.');
  }

  usedQuestions.push(data.question.slice(0, 70));
  return data;
}

// ── RENDER ────────────────────────────────────────────

function renderQuestion(data) {
  const area = document.getElementById('question-area');
  const optHTML = data.options.map((opt, i) => `
    <button class="option" id="opt-${i}" onclick="selectAnswer(${i}, ${data.answer})">
      <span class="opt-letter">${String.fromCharCode(65+i)}</span>
      ${escHtml(opt)}
    </button>
  `).join('');

  area.innerHTML = `
    <p class="question">${escHtml(data.question)}</p>
    <div class="options">${optHTML}</div>
    <div class="explain hidden" id="explain" data-text="${escAttr(data.explanation)}"></div>
    <button class="btn hidden" id="next-btn" onclick="loadQuestion()">Próxima pergunta →</button>
  `;
}

function selectAnswer(idx, correct) {
  if (answered) return;
  answered = true;

  const isCorrect = idx === correct;
  streakHistory.push(isCorrect ? 'hit' : 'miss');

  document.querySelectorAll('.option').forEach(b => b.disabled = true);
  document.getElementById(`opt-${correct}`).classList.add('correct');
  if (!isCorrect) {
    document.getElementById(`opt-${idx}`).classList.add('wrong');
    streak = 0;
  } else {
    streak = Math.min(streak + 1, 5);
    totalRight++;
  }

  let pts = 0;
  if (isCorrect) {
    const base = { facil: 5, medio: 10, dificil: 20 }[difficulty];
    const bonus = streak >= 3 ? Math.floor(base * 0.5) : 0;
    pts = base + bonus;
    score += pts;
  }

  flyPoints(isCorrect ? `+${pts}${streak >= 3 ? ' 🔥' : ''}` : '✗', isCorrect);
  updateScore();
  updateStreak();
  updateStats();
  updateProgress();

  const explainEl = document.getElementById('explain');
  explainEl.innerHTML = `<span class="${isCorrect ? 'correct-label' : 'wrong-label'}">${isCorrect ? '✓ Correto!' : '✗ Errado!'}</span> ${escHtml(explainEl.dataset.text || '')}`;
  explainEl.classList.remove('hidden');
  document.getElementById('next-btn').classList.remove('hidden');
}

// ── UI UPDATES ────────────────────────────────────────

function updateScore() {
  const badge = document.getElementById('score-badge');
  badge.textContent = `⭐ ${score} pts`;
  badge.classList.add('bump');
  setTimeout(() => badge.classList.remove('bump'), 220);
}

function updateStreak() {
  const dots = document.getElementById('streak-dots').children;
  const hist = streakHistory.slice(-5);
  for (let i = 0; i < 5; i++) {
    dots[i].className = 'dot';
    if (hist[i] === 'hit') dots[i].classList.add('hit');
    else if (hist[i] === 'miss') dots[i].classList.add('miss');
  }
}

function updateStats() {
  const total = streakHistory.length;
  document.getElementById('stats-mini').textContent = `${totalRight}/${total} ✓`;
}

function updateProgress() {
  const pct = Math.min((totalRight / Math.max(qCount, 1)) * 100, 100);
  document.getElementById('progress-bar').style.width = pct + '%';
}

function flyPoints(text, positive) {
  const el = document.createElement('div');
  el.className = 'fly' + (positive ? '' : ' neg');
  el.textContent = text;
  const rect = document.getElementById('quiz-screen').getBoundingClientRect();
  el.style.left = (rect.left + rect.width / 2 - 24) + 'px';
  el.style.top  = (rect.top + 70) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1100);
}

// ── UTILS ─────────────────────────────────────────────

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(s) {
  return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
